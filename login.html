<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <title>Login - HiveFlow</title>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <style>
    /* Centered Auth Layout */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-surface);
      position: relative;
      padding: 16px;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='138.56' viewBox='0 0 80 138.56' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l40 23.094v46.188L40 92.376 0 69.282V23.094z' stroke='%23C97B2A' stroke-width='1' stroke-opacity='0.1' fill='none'/%3E%3C/svg%3E");
      opacity: 0.5;
      z-index: 0;
    }

    [data-theme="dark"] body::before {
      stroke-opacity: 0.05;
    }

    .auth-form-container {
      width: 100%;
      max-width: 440px;
      background: var(--color-bg);
      padding: 48px 40px;
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: var(--weight-h3);
      color: var(--color-secondary);
      margin-bottom: var(--space-lg);
      text-decoration: none;
    }

    .auth-logo img {
      height: 48px;
      margin: 0 auto;
    }

    .auth-logo svg {
      width: 32px;
      height: 32px;
      fill: var(--color-primary);
    }

    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-bg);
      color: var(--color-secondary);
      font-family: var(--font-body);
      font-weight: var(--weight-btn);
      cursor: pointer;
      transition: all var(--transition-base);
      margin-bottom: var(--space-sm);
    }

    .social-btn:hover {
      background: var(--color-surface);
      border-color: var(--color-primary);
    }

    .social-icon {
      width: 20px;
      height: 20px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--color-muted);
      margin-block: var(--space-md);
      font-size: 0.9rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--color-border);
    }

    .auth-divider:not(:empty)::before {
      margin-right: .5em;
    }

    .auth-divider:not(:empty)::after {
      margin-left: .5em;
    }

    .auth-actions {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    @media (max-width: 480px) {
      body {
        padding-top: 72px;
      }

      .auth-actions {
        top: 16px;
        right: 16px;
      }

      .auth-form-container {
        padding: 32px 24px;
      }
    }

    .auth-link {
      color: var(--color-primary) !important;
      font-weight: var(--weight-btn);
      transition: color var(--transition-base), text-decoration var(--transition-base);
      text-decoration: none;
    }

    .auth-link:hover {
      color: var(--color-secondary) !important;
      text-decoration: underline;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--color-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition-base);
    }

    .password-toggle:hover {
      color: var(--color-primary);
    }

    [dir="rtl"] .password-toggle {
      right: auto;
      left: 12px;
    }

    [dir="rtl"] .password-wrapper input {
      padding-right: 12px !important;
      padding-left: 48px !important;
    }
  </style>
</head>

<body>

  <!-- Top Right Actions -->
  <div class="auth-actions" style="position: absolute; top: 24px; right: 24px; display: flex; gap: 12px; z-index: 10;">
    <button class="icon-btn rtl-toggle" aria-label="Toggle RTL">
      <i class="ph-duotone ph-arrows-left-right"></i>
    </button>
    <button class="icon-btn theme-toggle" aria-label="Toggle Dark Mode">
      <i class="ph-duotone ph-moon"></i>
    </button>
  </div>

  <div class="auth-form-container reveal">

    <a href="index.html" class="auth-logo">
      <img src="assets/images/logo.svg" alt="HiveFlow" class="logo-img">
    </a>

    <h3 style="text-align: center; margin-bottom: var(--space-lg);">Log in to your account</h3>

    <form class="needs-validation" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" required>
        <span class="error-msg"></span>
      </div>

      <div class="form-group" style="margin-bottom: var(--space-sm);">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" class="form-control" required minlength="8"
            style="padding-right: 48px;">
          <button type="button" class="password-toggle" aria-label="Toggle Password Visibility">
            <i class="ph-duotone ph-eye" style="font-size: 1.25rem;"></i>
          </button>
        </div>
        <span class="error-msg"></span>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md);">
        <label
          style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--color-secondary); cursor: pointer; user-select: none;">
          <input type="checkbox" name="remember" style="margin: 0; cursor: pointer;"> Remember me
        </label>
        <a href="#" class="auth-link" style="font-size: 0.9rem;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>

    <div class="auth-divider">or continue with</div>

    <button class="social-btn">
      <!-- Google Logo SVG -->
      <svg class="social-icon" viewBox="0 0 24 24">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4" />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853" />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          fill="#FBBC05" />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335" />
      </svg>
      Continue with Google
    </button>

    <button class="social-btn">
      <!-- Apple Logo SVG -->
      <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.53.68 3.12.68.65 0 2.04-.77 3.58-.65 1.25.04 2.4.45 3.24 1.24-2.82 1.68-2.36 5.48.51 6.64-.78 1.95-1.66 4.02-2.45 5.06zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.02 4.41-3.74 4.25z" />
      </svg>
      Continue with Apple
    </button>

    <p style="text-align: center; margin-top: var(--space-lg); color: var(--color-muted);">
      Don't have an account? <a href="register.html" class="auth-link">Register</a>
    </p>

  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.querySelectorAll('.password-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.previousElementSibling;
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'ph-duotone ph-eye-slash';
        } else {
          input.type = 'password';
          icon.className = 'ph-duotone ph-eye';
        }
      });
    });
  </script>
</body>

</html>
